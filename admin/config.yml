backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

  - name: "articles"
    label: "Articles"
    folder: "_articles"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - label: "Category"
        name: "category"
        widget: "select"
        options: ["Barrio", "Cultura", "Arte", "Gente", "Opinion"]
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Read Time (e.g. 5 min read)", name: "read_time", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Hero Image", name: "hero_image", widget: "image" }
      - { label: "Hero Image Caption", name: "hero_caption", widget: "string", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - label: "Featured on Homepage"
        name: "featured"
        widget: "boolean"
        default: false

  - name: "ticker"
    label: "News Ticker"
    files:
      - label: "Ticker Items"
        name: "ticker_items"
        file: "_data/ticker.yml"
        fields:
          - label: "Ticker Headlines"
            name: "items"
            widget: "list"
            fields:
              - { label: "Headline", name: "headline", widget: "string" }

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "_data/settings.yml"
        fields:
          - { label: "Site Name", name: "site_name", widget: "string", default: "Échale Ganas" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Footer Description", name: "footer_description", widget: "text" }
          - { label: "Instagram URL", name: "instagram", widget: "string", required: false }
          - { label: "Twitter/X URL", name: "twitter", widget: "string", required: false }
          - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
          - { label: "TikTok URL", name: "tiktok", widget: "string", required: false }
